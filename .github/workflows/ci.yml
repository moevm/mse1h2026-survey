name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  repository-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Create CI env files for compose
        run: |
          mkdir -p env
          cp env/pgsql.env.example env/pgsql.env
          cp env/pgsql_test.env.example env/pgsql_test.env
          cp env/pgadmin.env.example env/pgadmin.env

      - name: Validate docker compose file
        run: docker compose -f docker-compose.yaml config --quiet

      - name: Reject unresolved merge conflicts
        run: |
          if git grep -n -E '^(<<<<<<<|=======|>>>>>>>)' -- ':!*.md'; then
            echo "Unresolved merge conflict markers found."
            exit 1
          fi

      - name: Reject generated frontend artifacts
        run: |
          if git ls-files --error-unmatch frontend/.vite reports/*.html >/dev/null 2>&1; then
            echo "Generated artifacts must not be committed."
            exit 1
          fi

  backend-migrations:
    name: Backend migrations
    runs-on: ubuntu-latest
    needs: repository-hygiene

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: survey_migrations
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/survey_migrations
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt

      - name: Assert a single Alembic head
        working-directory: backend
        run: |
          python - <<'PY'
          from alembic.config import Config
          from alembic.script import ScriptDirectory

          script = ScriptDirectory.from_config(Config("alembic.ini"))
          heads = script.get_heads()
          if len(heads) != 1:
              raise SystemExit(f"Expected exactly one Alembic head, got {heads}")
          print(f"Alembic head: {heads[0]}")
          PY

      - name: Upgrade database schema
        working-directory: backend
        run: python -m alembic upgrade head

      - name: Show current revision
        working-directory: backend
        run: python -m alembic current

  backend-tests:
    name: Backend tests and coverage
    runs-on: ubuntu-latest
    needs: backend-migrations

    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: survey_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    env:
      TEST_DATABASE_URL: postgresql://postgres:postgres@localhost:5432/survey_test
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/survey_test
      PYTHONPATH: ${{ github.workspace }}/backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install backend dependencies
        run: python -m pip install -r requirements.txt pytest-cov

      - name: Compile backend modules
        run: python -m compileall -q backend

      - name: Run backend tests
        working-directory: backend
        run: >
          python -m pytest -q
          --junitxml=test-results/pytest.xml
          --cov=main
          --cov=models
          --cov=schemas
          --cov=utils
          --cov-report=term-missing
          --cov-report=xml
          --cov-fail-under=45

      - name: Upload backend test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-results
          path: backend/test-results/

      - name: Upload backend coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml

  frontend:
    name: Frontend lint, tests and build
    runs-on: ubuntu-latest
    needs: repository-hygiene

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Lint frontend
        working-directory: frontend
        run: npm run lint

      - name: Run frontend unit tests
        working-directory: frontend
        run: npm test

      - name: Build frontend
        working-directory: frontend
        run: npm run build

      - name: Upload frontend build
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/dist/

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [backend-tests, frontend]

    steps:
      - uses: actions/checkout@v4

      - name: Create CI env files for compose
        run: |
          mkdir -p env
          cp env/pgsql.env.example env/pgsql.env
          cp env/pgsql_test.env.example env/pgsql_test.env
          cp env/pgadmin.env.example env/pgadmin.env

      - name: Build docker compose images
        run: docker compose -f docker-compose.yaml build
